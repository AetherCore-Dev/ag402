services:
  # Mock upstream API (weather service, no auth)
  weather-api:
    build: .
    command: python -m uvicorn examples.mock_weather_server:app --host 0.0.0.0 --port 8000
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      retries: 3

  # x402 payment gateway (protects the weather API)
  x402-gateway:
    build: .
    command: >
      ag402-gateway
      --target http://weather-api:8000
      --price 0.02
      --address DemoRecipientWa11et11111111111111111111
      --host 0.0.0.0
      --port 8001
    ports:
      - "18001:8001"
    depends_on:
      weather-api:
        condition: service_healthy
    environment:
      - X402_MODE=test
      - AG402_UNLOCK_PASSWORD=${AG402_UNLOCK_PASSWORD:-}
