name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install pip-audit
        run: |
          pip install -e protocol/ -e core/ -e "adapters/mcp/" -e "adapters/client_mcp/"
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.67.0
    steps:
      - uses: actions/checkout@v6
      - run: semgrep scan --config auto --sarif --output=semgrep-results.sarif .
      - name: Upload results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'semgrep-results.sarif'
