name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish-protocol:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: cd protocol && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: protocol/dist/

  publish-core:
    runs-on: ubuntu-latest
    needs: publish-protocol
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: cd core && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: core/dist/

  publish-mcp:
    runs-on: ubuntu-latest
    needs: publish-core
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: cd adapters/mcp && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: adapters/mcp/dist/

  publish-client-mcp:
    runs-on: ubuntu-latest
    needs: publish-core
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: cd adapters/client_mcp && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: adapters/client_mcp/dist/
